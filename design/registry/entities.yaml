      - design/gdd/card-quality-system.md
      - design/gdd/resolution-engine.md
      - design/gdd/stamp-system.md
    variables:
      - quality_level
    output_range: [0.05, 0.15]
    expression: "lookup: III=0.15, II=0.10, I=0.05"
    notes: "Applies identically to all gem types. Metal qualities never destroyed."
    added: 2026-04-23
    revised: ""

  - name: metal_chip_bonus
    status: active
    source: design/gdd/card-data-model.md
    referenced_by:
      - design/gdd/card-data-model.md
      - design/gdd/card-quality-system.md
      - design/gdd/stamp-system.md
      - design/gdd/resolution-engine.md
