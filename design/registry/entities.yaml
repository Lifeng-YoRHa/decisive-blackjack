    notes: "AI heuristic for choosing among matching hand types. SPADE_BLACKJACK = infinity (always pick). Used by AI opponent system for optimal hand type selection."
    added: 2026-04-24
    revised: "2026-04-24 — was [2, 1177] (per-card max); corrected to SUM total max"

