    notes: "AI max HP per opponent. Piecewise linear curve. Opponent 1 is tutorial (below player HP)."
    added: 2026-04-24
    revised: ""

  - name: hand_point_total
    status: active
    source: design/gdd/point-calculation-engine.md
    referenced_by:
