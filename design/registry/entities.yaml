    output_range: [1, 11]
    expression: "sort(cards, by=[effect_value DESC, rank DESC, suit ASC])"
    notes: "Deterministic AI tiebreak within same stamp_sort_key group. Fallback when AI system doesn't provide custom strategy."
    added: 2026-04-24
    revised: ""

  - name: flush_multiplier
    status: active
