      - non_ace_sum
      - ace_count
      - BUST_THRESHOLD
    output_range: [2, 31]
    expression: "Greedy: sum non-Ace bj_values + Aces×11, downgrade Aces by 10 while total > 21"
    notes: "Primary calculation. Returns PointResult with total, is_bust, ace_count, soft_ace_count, card_count."
    added: 2026-04-24
    revised: ""

  - name: simulate_hit
    status: active
    source: design/gdd/point-calculation-engine.md
