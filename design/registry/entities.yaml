    expression: "bust_damage_dd = point_total × bust_damage_multiplier × 2"
    notes: "Conditional variant of bust_self_damage when doubledown_active=true. The ×2 applies only to doubledown, not to normal busts or split hands."
    added: 2026-04-24
    revised: ""

  - name: ai_hp_scaling
    status: active
    source: design/gdd/combat-system.md
