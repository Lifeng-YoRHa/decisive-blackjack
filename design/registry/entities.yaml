      - M_base
      - affected_indices
    output_range: [1.0, 11.0]
    expression: "M_base IF (ALL or scoped+in_indices), 1.0 IF (scoped+not_in_indices)"
    notes: "Per-card multiplier array. Scoped types (PAIR/THREE_KIND) apply M_base to affected cards only. ALL types apply to every card."
    added: 2026-04-24
    revised: ""

  - name: ai_hand_type_score
