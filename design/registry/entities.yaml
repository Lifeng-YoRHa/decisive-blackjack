    output_range: [1, 11]
    expression: "enumerate(sorted_hand, 1-based): card[0]=pos1, card[1]=pos2, ..."
    notes: "Maps sorted hand to 1-based settlement positions. Frozen after confirm."
    added: 2026-04-24
    revised: ""

  - name: ai_default_tiebreak
    status: active
    source: design/gdd/card-sorting-system.md
    referenced_by:
