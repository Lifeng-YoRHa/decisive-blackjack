    notes: "Stamp flat bonus values. Non-numeric stamps (HAMMER, RUNNING_SHOES, TURTLE) have no bonus_value. Tuning knobs: stamp_sword_bonus, stamp_shield_bonus, stamp_heart_bonus, stamp_coin_bonus."
    added: 2026-04-24
    revised: ""

