    output_range: [0, 400]
    expression: "floor(total_investment × sell_price_ratio)"
    notes: "Shop sell refund. total_investment range [0, 800] (max = HAMMER 300 + DIAMOND I 200 + purify 300). sell_price_ratio = 0.50, so max output = 400. Implements chip-economy sell_price formula with total_investment as buy_price."
    added: 2026-04-25
    revised: ""
