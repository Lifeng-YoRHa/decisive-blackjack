    output_range: [1, 11]
    expression: "stable_sort(hand, primary=stamp_sort_key ASC, secondary=manual_order ASC)"
    notes: "Two-pass sort: manual drag order then stamp auto-grouping. Output feeds resolution engine's alternating settlement."
    added: 2026-04-24
    revised: ""

