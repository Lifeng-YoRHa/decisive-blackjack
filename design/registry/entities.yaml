    added: 2026-04-23
    revised: ""

  - name: counter_attack_damage
    status: deprecated
    source: design/gdd/combat-system.md
    referenced_by: []
    variables:
      - attacker_defense
    output_range: [0, 200]
    expression: "counter_damage = attacker.defense (identity — raw defense value, no modifiers)"
    notes: "REMOVED: Counter-attacks eliminated (黑桃削弱). Spades now provide pure defense only."
    added: 2026-04-24
    revised: "2026-04-24 — deprecated: counter-attack phase removed. defense resets at end of round."

  - name: bust_self_damage
    status: active
    source: design/gdd/combat-system.md
    referenced_by:
