    output_range: [10, 82]
    expression: "lookup table by (quality, quality_level)"
    notes: "Extra chips from metal quality cards during resolution."
    added: 2026-04-23
    revised: ""

  - name: gem_bonus
    status: active
    source: design/gdd/card-data-model.md
    referenced_by:
      - design/gdd/card-data-model.md
      - design/gdd/card-quality-system.md
      - design/gdd/resolution-engine.md
      - design/gdd/stamp-system.md
      - design/gdd/ai-opponent.md
