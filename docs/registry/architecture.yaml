# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-04-26"

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: game_system_refs
    status: active
    owner_system: GameManager
    adr: docs/architecture/adr-0001-scene-node-architecture.md
    interface: "GameManager holds @onready refs to all 17 subsystems; injects via initialize() during _ready()"
    write_access: game-manager-only
    referenced_by:
      - docs/architecture/adr-0001-scene-node-architecture.md
    added: 2026-04-26
    revised: ""
  - state: card_instance_attrs
    status: active
    owner_system: CardDataModel
    adr: docs/architecture/adr-0002-card-data-model.md
    interface: "CardInstance.assign_stamp(), assign_quality(), destroy_quality(), purify() — mutation only via these methods; revision auto-incremented; attribute_changed signal emitted"
    write_access: card-data-model-only (via mutation methods)
    referenced_by:
      - docs/architecture/adr-0002-card-data-model.md
      - docs/architecture/adr-0001-scene-node-architecture.md
    added: 2026-04-26
    revised: ""
  - state: save_data
    status: active
    owner_system: SaveSystem (or RoundManager if no dedicated SaveSystem)
    adr: docs/architecture/adr-0005-save-load-strategy.md
    interface: "save_game() -> bool, load_game() -> bool — JSON file at user://save_game.json; atomic validation before applying"
    write_access: save-system-only
    referenced_by:
      - docs/architecture/adr-0005-save-load-strategy.md
    added: 2026-04-26
    revised: ""
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: subsystem_initialization
    status: active
    pattern: direct_call
    producer: GameManager
    consumers:
      - all subsystems
    adr: docs/architecture/adr-0001-scene-node-architecture.md
    signal_signature: "initialize(deps...) -> void — each subsystem declares its dependencies as parameters"
    referenced_by:
      - docs/architecture/adr-0001-scene-node-architecture.md
    added: 2026-04-26
    revised: ""
  - contract: state_change_notification
    status: active
    pattern: signal
    producer: "any system that owns mutable state (CombatState, ChipEconomy, CardInstance, RoundManager)"
    consumers:
      - UI (TableUI for rendering)
      - other systems that react to state changes
    adr: docs/architecture/adr-0003-signal-architecture.md
    signal_signature: "{noun}_changed(args...) — emitted after state mutation; typed parameters"
    referenced_by:
      - docs/architecture/adr-0003-signal-architecture.md
    added: 2026-04-26
    revised: ""
  - contract: player_request_signal
    status: active
    pattern: signal
    producer: TableUI
    consumers:
      - RoundManager
      - ShopSystem
      - ItemSystem
    adr: docs/architecture/adr-0003-signal-architecture.md
    signal_signature: "player_{action}_requested(args...) — UI emits, logic connects; UI never calls logic methods directly"
    referenced_by:
      - docs/architecture/adr-0003-signal-architecture.md
    added: 2026-04-26
    revised: ""
  - contract: settlement_event_queue
    status: active
    pattern: signal
    producer: ResolutionEngine
    consumers:
      - TableUI (animation playback)
    adr: docs/architecture/adr-0003-signal-architecture.md
    signal_signature: "settlement_step_completed(events: Array[SettlementEvent]) — pre-computed event queue emitted after synchronous pipeline completion"
    referenced_by:
      - docs/architecture/adr-0003-signal-architecture.md
    added: 2026-04-26
    revised: ""
  - contract: settlement_pipeline
    status: active
    pattern: direct_call
    producer: RoundManager
    consumers:
      - ResolutionEngine
    adr: docs/architecture/adr-0004-resolution-pipeline.md
    signal_signature: "run_pipeline(14 params) -> RoundResult — synchronous, deterministic, stateless between runs"
    referenced_by:
      - docs/architecture/adr-0004-resolution-pipeline.md
    added: 2026-04-26
    revised: ""


# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets: []

# Example:
#
# performance_budgets:
#   - target_fps: 60
#     total_frame_budget_ms: 16.6
#     platform: PC             # PC | Console | Mobile | All
#     adr: docs/architecture/adr-0000-performance-targets.md
