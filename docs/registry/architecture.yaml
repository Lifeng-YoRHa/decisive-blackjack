# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: subsystem_reference_acquisition
    status: active
    api: "@onready var + $NodePath in GameManager"
    not: Autoload singletons, get_node() in subsystems, global access patterns
    adr: docs/architecture/adr-0001-scene-node-architecture.md
    reason: "Composition root pattern: GameManager wires all refs at _ready(). Subsystems receive deps via initialize(). No global state, testable, enforces layer boundaries."
    referenced_by:
      - docs/architecture/adr-0001-scene-node-architecture.md
    added: 2026-04-26
    revised: ""
  - purpose: card_data_model_types
    status: active
    api: RefCounted for CardPrototype and CardInstance
    not: Resource (too heavy for 104 internal instances), Node (no per-frame logic needed)
    adr: docs/architecture/adr-0002-card-data-model.md
    reason: "104 lightweight RefCounted objects with custom to_dict/from_dict serialization. Data defined in GDDs, not edited in Inspector. Performance-sensitive reads during resolution."
    referenced_by:
      - docs/architecture/adr-0002-card-data-model.md
    added: 2026-04-26
    revised: ""
  - purpose: phase_execution_pattern
    status: active
    api: "Pure computation (Phases 1-4) + dispatch-only (Phase 5) + mutation-only (Phase 6)"
    not: Mixed computation and side effects within a single phase
    adr: docs/architecture/adr-0004-resolution-pipeline.md
    reason: "Separation of pure arithmetic from API calls and state mutations enables unit testing of computation phases without dependencies."
    referenced_by:
      - docs/architecture/adr-0004-resolution-pipeline.md
    added: 2026-04-26
    revised: ""
  - purpose: save_data_format
    status: active
    api: "JSON via FileAccess (user://save_game.json) with schema versioning"
    not: "Godot Resource binary (.tres), encrypted binary, custom binary format"
    adr: docs/architecture/adr-0005-save-load-strategy.md
    reason: "CardInstance is RefCounted (not Resource) — custom to_dict/from_dict already required. JSON is human-readable, debuggable, and works with existing serialization API."
    referenced_by:
      - docs/architecture/adr-0005-save-load-strategy.md
    added: 2026-04-26
    revised: ""
  - purpose: ai_decision_pattern
    status: active
    api: "Single AIOpponent class with tier-indexed const lookup tables"
    not: "Polymorphic strategy subclasses (3 classes for 3 tiers), data-driven JSON decision tables"
    adr: docs/architecture/adr-0006-ai-strategy-pattern.md
    reason: "3 tiers differ only in hit/stand logic (20 lines). Lookup tables achieve same effect as polymorphism without 3x boilerplate. SMART/OPTIMAL require runtime computation not suitable for data-driven tables."
    referenced_by:
      - docs/architecture/adr-0006-ai-strategy-pattern.md
    added: 2026-04-26
    revised: ""
  - purpose: shop_weighted_selection
    status: active
    api: "Inline cumulative weight scan (O(n) per draw, Dictionary weights)"
    not: "Utility WeightedSelector class (over-engineered for 2 call sites), pre-built pool (423 items for 4 draws)"
    adr: docs/architecture/adr-0007-shop-weighted-random.md
    reason: "Only shop needs weighted random. 15-line inline function serves same purpose as 100-line utility class with zero reuse."
    referenced_by:
      - docs/architecture/adr-0007-shop-weighted-random.md
    added: 2026-04-26
    revised: ""
  - purpose: ui_scene_composition
    status: active
    api: "Multi-scene composition (TableUI.tscn + CardView.tscn + ShopOverlay.tscn)"
    not: "Monolithic single .tscn (500+ nodes unwieldy), programmatic node creation (no editor preview)"
    adr: docs/architecture/adr-0008-ui-node-hierarchy.md
    reason: "CardView and ShopOverlay have distinct lifecycles. Separating scenes enables independent editing, card pooling, and keeps scene tree manageable."
    referenced_by:
      - docs/architecture/adr-0008-ui-node-hierarchy.md
    added: 2026-04-26
    revised: ""

forbidden_patterns:
  - pattern: get_node_outside_game_manager
    status: active
    description: "Subsystems must not call get_node() or get_parent() to find other subsystems. Only GameManager and TableUI scene setup may use node path lookups."
    why: "Node path lookups create hidden dependencies, break when scene tree changes, and violate the explicit dependency injection pattern."
    adr: docs/architecture/adr-0001-scene-node-architecture.md
    added: 2026-04-26

  - pattern: accessing_subsystem_without_injected_ref
    status: active
    description: "No subsystem may access another subsystem without receiving a reference via initialize(). No globals, no singletons, no autoloads for game logic."
    why: "Hidden access breaks the dependency direction (Core must not call Feature). Injected refs make dependencies explicit and testable."
    adr: docs/architecture/adr-0001-scene-node-architecture.md
    added: 2026-04-26

  - pattern: event_bus_or_string_dispatch
    status: active
    description: "No centralized EventBus node or string-based signal dispatch. Use Godot's native typed signals on each system node."
    why: "String-based dispatch loses type safety. Native signals provide typed parameters, editor support, and explicit connections visible in GameManager._wire_signals()."
    adr: docs/architecture/adr-0003-signal-architecture.md
    added: 2026-04-26

  - pattern: ui_calling_logic_methods
    status: active
    description: "UI must never call game logic methods directly. All player actions are forwarded via player_*_requested signals that logic nodes connect to."
    why: "Direct calls create hidden coupling between presentation and logic layers. Request signals keep UI as a pure consumer and make the dependency direction explicit."
    adr: docs/architecture/adr-0003-signal-architecture.md
    added: 2026-04-26
